name: tattoo
description: "A modern reimplementation of TAT — the course helper app for Taipei Tech students"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.9
  dio: ^5.9.2
  cookie_jar: ^4.0.9
  dio_cookie_manager: ^3.4.0
  html: ^0.15.6
  dio_redirect_interceptor: ^1.0.1
  collection: ^1.19.1
  intl: ^0.20.2
  flutter_svg: ^2.2.4
  drift: ^2.32.1
  drift_flutter: ^0.3.0
  path_provider: ^2.1.5
  url_launcher: ^6.3.2
  riverpod: ^3.2.1
  flutter_riverpod: ^3.3.1
  go_router: ^17.1.0
  flutter_secure_storage: ^10.0.0
  package_info_plus: ^9.0.1
  image_picker: ^1.2.1
  skeletonizer: ^2.1.3
  animations: ^2.1.2
  google_fonts: ^8.0.2
  slang: ^4.14.0
  slang_flutter: ^4.14.0
  http_parser: ^4.1.2
  shared_preferences: ^2.5.5
  drift_dev: ^2.32.1 # TODO: move back to dev_dependencies after first release
  flutter_image_compress: ^2.4.0
  msgpack_dart: ^1.0.1
  firebase_core: ^4.6.0
  firebase_crashlytics: ^5.1.0
  firebase_analytics: ^12.2.0
  auto_size_text: ^3.0.0
  mobile_scanner: ^7.2.0
  cached_network_image: ^3.4.1
  sqlite3_flutter_libs: ^0.6.0+eol
  flutter_cache_manager: ^3.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  build_runner: ^2.13.1
  pointycastle: ^4.0.0
  slang_mcp: ^0.1.3

flutter:
  uses-material-design: true
  assets:
    - assets/
