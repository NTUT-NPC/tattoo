name: Setup Project
description: Install development tools with mise and get dependencies

inputs:
  platform:
    description: The target platform (e.g., ios, android)

runs:
  using: composite
  steps:
    - name: Install mise
      uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
      with:
        install_args: >
          ${{ case(
            inputs.platform == 'android', 'flutter java',
            inputs.platform == 'ios', 'flutter',
            'flutter'
          ) }}
        add_shims_to_path: false # Use direct bin paths

    - name: Verify Flutter version
      id: flutter-version
      if: ${{ inputs.platform == 'android' }}
      shell: bash
      run: |
        FLUTTER_VERSION=$(mise current flutter)
        if [ "$FLUTTER_VERSION" != "3.44.4" ]; then
          echo "::error::Flutter version has changed to $FLUTTER_VERSION. Please update cache paths accordingly."
          exit 1
        fi
        echo "flutter_version=$FLUTTER_VERSION" >> $GITHUB_OUTPUT

    - name: Setup Ruby
      if: ${{ inputs.platform == 'android' || inputs.platform == 'ios' }}
      uses: ruby/setup-ruby@d45b1a4e94b71acab930e56e79c6aa188764e7f9 # v1.316.0
      with:
        bundler-cache: true
      env:
        BUNDLE_FROZEN: "true"

    - name: Setup Flutter pub cache
      uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5.1.0
      with:
        key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
        path: ~/.pub-cache
        restore-keys: |
          ${{ runner.os }}-pub-

    - name: Install Flutter dependencies
      shell: bash
      run: flutter pub get --enforce-lockfile

    - name: Setup Gradle cache
      if: ${{ inputs.platform == 'android' }}
      uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5.1.0
      with:
        key: ${{ runner.os }}-gradle-${{ hashFiles('android/**/*.gradle*', 'android/**/gradle.properties', 'android/gradle/wrapper/gradle-wrapper.properties') }}
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Setup Android SDK cache
      if: ${{ inputs.platform == 'android' }}
      uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5.1.0
      with:
        key: ${{ runner.os }}-android-sdk-${{ steps.flutter-version.outputs.flutter_version }}
        # Update paths when updating Flutter version
        path: |
          /usr/local/lib/android/sdk/cmake/3.22.1
        restore-keys: |
          ${{ runner.os }}-android-sdk-

    - name: Select Xcode version
      id: xcode_version
      if: ${{ inputs.platform == 'ios' }}
      shell: bash
      run: |
        sudo xcode-select -s /Applications/Xcode_26.5.app/Contents/Developer
        XCODE_VERSION=$(xcodebuild -version | sed -n 's/^Xcode //p')
        echo "xcode_version=$XCODE_VERSION" >> "$GITHUB_OUTPUT"

    - name: Setup Swift Package Manager cache
      if: ${{ inputs.platform == 'ios' }}
      uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5.1.0
      with:
        key: ${{ runner.os }}-spm-${{ runner.arch }}-xcode-${{ steps.xcode_version.outputs.xcode_version }}-${{ hashFiles('ios/Runner.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}
        path: ~/Library/Developer/Xcode/DerivedData/*/SourcePackages
        restore-keys: |
          ${{ runner.os }}-spm-${{ runner.arch }}-xcode-${{ steps.xcode_version.outputs.xcode_version }}-
          ${{ runner.os }}-spm-${{ runner.arch }}-

    - name: Setup CocoaPods cache
      if: ${{ inputs.platform == 'ios' }}
      uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5.1.0
      with:
        key: ${{ runner.os }}-pods-${{ hashFiles('ios/Podfile.lock') }}
        path: ios/Pods
        restore-keys: |
          ${{ runner.os }}-pods-

    - name: Check iOS config drift
      id: ios-drift
      if: ${{ inputs.platform == 'ios' }}
      shell: bash
      run: |
        flutter build ios --config-only --no-pub --no-codesign

        if git diff --quiet ios/; then
          echo "changed=false" >> $GITHUB_OUTPUT
        else
          git diff --text ios/ > ios-drift.patch
          echo "changed=true" >> $GITHUB_OUTPUT
        fi

    - name: Upload iOS drift patch
      if: ${{ inputs.platform == 'ios' && steps.ios-drift.outputs.changed == 'true' }}
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        archive: false
        path: ios-drift.patch

    - name: Fail on iOS config drift
      if: ${{ inputs.platform == 'ios' && steps.ios-drift.outputs.changed == 'true' }}
      shell: bash
      run: |
        XCODE_VERSION=$(xcodebuild -version | head -1)
        echo "::error::ios/ drifted after flutter build ios --config-only (CI ${XCODE_VERSION}). Mismatched local Xcode is the usual cause; otherwise apply ios-drift.patch from artifacts."
        exit 1
