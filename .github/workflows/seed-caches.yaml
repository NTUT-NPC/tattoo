name: Seed Caches

on:
  push:
    branches:
      - main
    paths:
      - mise.toml
  schedule:
    - cron: "17 0 * * 0" # Weekly on Sunday at 00:17 UTC
  workflow_dispatch:

jobs:
  android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Setup project
        uses: ./.github/actions/setup-project
        with:
          platform: android

      - name: Warm Gradle and Android SDK caches
        run: flutter build apk --debug --no-pub

  ios:
    runs-on: macos-26
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Setup project
        uses: ./.github/actions/setup-project
        with:
          platform: ios

      - name: Warm CocoaPods cache
        run: cd ios && bundle exec pod install
